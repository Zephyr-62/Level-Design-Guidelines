<script>
    document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(
        'a[href$=".png"], a[href$=".jpg"], a[href$=".jpeg"], a[href$=".gif"]'
    ).forEach(link => {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
    });
    });
</script>
